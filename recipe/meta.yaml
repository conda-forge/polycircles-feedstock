{% set name = "polycircles" %}
{% set version = "0.3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5e7a1872e88694bbaab98c97912e94babb60edb4be14f84c248dbe11960ac9e3


build:
  noarch: python
  number: 3
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python >={{ python_min }}
    - geographiclib
    - geopy >=0.99
    - nose >=1.3.0
    - simplekml >=1.2.3


test:
  requires:
    - python {{ python_min }}
  imports:
    - polycircles


about:
  home: http://polycircles.rtfd.org
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: "Polycircles: WGS84 Circle approximations using polygons"
  dev_url: https://github.com/adamatan/polycircles

extra:
  recipe-maintainers:
    - mxr-conda
    - Tata17
    - oblute
    - rluria14
